<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oferta Especial</title>
<style>
  body { background: #000; color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
  .hero-img { width: 100%; height: 60vh; object-fit: cover; }
  .logo-overlay { position: absolute; top: 20px; left: 20px; width: 80px; }
  .content { padding: 20px; background: #0a0a0a; border-top: 2px solid #ff0055; margin-top: -30px; position: relative; border-radius: 20px 20px 0 0; }
  h1 { font-size: 32px; margin: 10px 0; text-transform: uppercase; }
  .price { font-size: 40px; color: #ffe600; font-weight: bold; margin: 10px 0; }
  .desc { color: #ccc; line-height: 1.5; margin: 20px 0; font-size: 14px; }
  .btn-wa { display: block; background: #25D366; color: white; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 18px; margin-top: 20px; box-shadow: 0 4px 15px rgba(37,211,102,0.4); }
  .badge { background: #ff0055; color: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
</style>
</head>
<body>

<div style="position:relative">
  <img id="heroImg" class="hero-img">
  <img id="logoImg" class="logo-overlay" style="display:none">
</div>

<div class="content">
  <div class="badge">🔥 SOLO HOY</div>
  <h1 id="pName">Cargando...</h1>
  <div class="price" id="pPrice">$0</div>
  <p class="desc" id="pDesc">...</p>
  <a id="waBtn" class="btn-wa" href="#">💬 PEDIR AHORA</a>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  document.getElementById('pName').textContent = params.get('name');
  document.getElementById('pPrice').textContent = params.get('price');
  document.getElementById('pDesc').textContent = params.get('desc');
  document.getElementById('heroImg').src = params.get('img');
  
  if(params.get('logo')) {
    const l = document.getElementById('logoImg');
    l.src = params.get('logo');
    l.style.display = 'block';
  }

  const wa = params.get('wa');
  const msg = `Hola! Vi la promo de ${params.get('name')} en Instagram y quiero pedirlo.`;
  document.getElementById('waBtn').href = `https://wa.me/${wa}?text=${encodeURIComponent(msg)}`;
</script>

</body>
</html>
