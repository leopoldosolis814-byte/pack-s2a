<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Pack S2A</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  body { background: #07070f; color: #fff; font-family: 'Nunito', sans-serif; margin: 0; padding-bottom: 50px; }
  header { background: rgba(0,0,0,0.8); padding: 15px; text-align: center; border-bottom: 1px solid #333; position: sticky; top: 0; backdrop-filter: blur(10px); z-index: 100; }
  h1 { font-family: 'Bebas Neue'; letter-spacing: 2px; margin: 0; font-size: 28px; }
  .container { padding: 20px; max-width: 600px; margin: 0 auto; }
  
  .card { background: #111; border-radius: 12px; overflow: hidden; margin-bottom: 25px; border: 1px solid #333; }
  .card-img { width: 100%; aspect-ratio: 9/16; object-fit: cover; }
  .card-body { padding: 15px; }
  .card-title { font-family: 'Bebas Neue'; font-size: 20px; color: #ffe600; margin: 0 0 5px 0; }
  .card-price { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 10px; }
  
  .btn-group { display: grid; gap: 8px; }
  .btn { border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; width: 100%; }
  .btn-dl { background: #ff0055; color: white; }
  .btn-link { background: #222; color: #ffe600; border: 1px solid #ffe600; }
  .btn-phrase { background: #000; color: #aaa; border: 1px dashed #555; }
  
  .note { font-size: 11px; color: #666; text-align: center; margin-top: 20px; }
</style>
</head>
<body>

<header>
  <img id="logoHeader" style="height: 30px; margin-right: 10px; vertical-align: middle;">
  <h1 id="localName">CARGANDO...</h1>
</header>

<div class="container" id="content">
  <p style="text-align:center; color:#666;">Procesando tu pack...</p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const rawData = params.get('data');
  
  if(!rawData) {
    document.getElementById('content').innerHTML = '<p style="text-align:center">Error: No hay datos.</p>';
  } else {
    try {
      const data = JSON.parse(decodeURIComponent(rawData));
      document.getElementById('localName').textContent = data.local;
      if(data.logo) document.getElementById('logoHeader').src = data.logo;

      let html = '';
      data.items.forEach((item, index) => {
        const itemId = `item-${index}`;
        
        // CORRECCIÓN: URL APUNTANDO AL REPO NUEVO PARA LA CONVERSIÓN
        const convUrl = `https://pack-s2a.vercel.app/conversion.html?name=${encodeURIComponent(item.name)}&price=${encodeURIComponent(item.price)}&desc=${encodeURIComponent(item.desc)}&img=${encodeURIComponent(item.img)}&wa=${data.wa}&logo=${encodeURIComponent(data.logo)}`;

        html += `
          <div class="card">
            <img src="${item.img}" class="card-img" id="${itemId}-img">
            <div class="card-body">
              <h2 class="card-title">${item.name}</h2>
              <div class="card-price">${item.price}</div>
              
              <div class="btn-group">
                <button class="btn btn-dl" onclick="downloadWithLogo('${itemId}-img', '${data.logo}', '${data.local}-${index}')">⬇️ DESCARGAR IMAGEN</button>
                <button class="btn btn-link" onclick="copyText('${convUrl}')">🔗 COPIAR LINK PARA STICKER</button>
                <button class="btn btn-phrase" onclick="copyText('${item.phrase.replace(/'/g, "\\'")}')">📋 COPIAR FRASE</button>
              </div>
            </div>
          </div>
        `;
      });
      document.getElementById('content').innerHTML = html;
      
    } catch(e) {
      console.error(e);
      document.getElementById('content').innerHTML = '<p style="text-align:center">Error al leer datos.</p>';
    }
  }

  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => alert("¡Copiado al portapapeles!"));
  }

  function downloadWithLogo(imgId, logoUrl, filename) {
    const img = document.getElementById(imgId);
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);

    if(logoUrl) {
      const logo = new Image();
      logo.crossOrigin = "Anonymous";
      logo.src = logoUrl;
      logo.onload = () => {
        const size = canvas.width * 0.2; 
        ctx.drawImage(logo, canvas.width - size - 20, 20, size, size * (logo.height/logo.width));
        triggerDownload(canvas, filename);
      };
    } else {
      triggerDownload(canvas, filename);
    }
  }

  function triggerDownload(canvas, filename) {
    const link = document.createElement('a');
    link.download = filename + '.png';
    link.href = canvas.toDataURL();
    link.click();
  }
</script>
</body>
</html>
