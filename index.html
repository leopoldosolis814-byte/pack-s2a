<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pack S2A</title>

<style>
body {
  background:#0b0b0b;
  font-family:Arial;
  color:white;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card {
  background:#111;
  padding:10px;
  border-radius:10px;
}

img {
  width:100%;
  border-radius:10px;
}

button {
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#ff2d78;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="grid" id="grid"></div>

<script>

const params = new URLSearchParams(window.location.search);

const items = [
  {id:1, img:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263235/Gemini_Generated_Image_bruchsbruchsbruc_etzmgj.png"},
  {id:2, img:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263237/Gemini_Generated_Image_ehiim7ehiim7ehii_i5crwt.png"},
  {id:3, img:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263237/Gemini_Generated_Image_sbvguqsbvguqsbvg_vjubkz.png"}
];

function copyLink(link){
  navigator.clipboard.writeText(link);
  alert("Link copiado");
}

function render(){
  const grid = document.getElementById("grid");

  items.forEach(item => {

    const link = params.get("link" + item.id) || "https://tulocal.com";

    grid.innerHTML += `
      <div class="card">
        <img src="${item.img}">
        <button onclick="copyLink('${link}')">
          COPIAR LINK
        </button>
      </div>
    `;
  });
}

render();

</script>

</body>
</html>
