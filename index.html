<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S2A Studio — Hamburguesería</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
/* TODO TU CSS IGUAL (no cambia nada) */
</style>
</head>

<body>

<header>
  <div class="logo">STORY<em>2</em>ACTION</div>
  <div class="rubro-tag">HAMBURGUESERÍA</div>
</header>

<div class="hero">
  <div class="hero-glow"></div>
  <div class="hero-eyebrow">ACCESO EXCLUSIVO · PACK DEL MES</div>
  <div class="hero-title">TU CONTENIDO<br><span>ESTÁ LISTO</span></div>
  <div class="hero-line"></div>
  <div class="hero-sub">Descargá, publicá y convertí<br>cada historia en una venta.</div>
</div>

<div class="section">
  <div class="section-body">
    <div class="content-grid" id="gImg"></div>
  </div>
</div>

<script>

const IMGS = [
  { id:1, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263235/Gemini_Generated_Image_bruchsbruchsbruc_etzmgj.png", link:"https://tulocal.com/promo" },
  { id:2, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263237/Gemini_Generated_Image_ehiim7ehiim7ehii_i5crwt.png", link:"https://tulocal.com/promo" },
  { id:3, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263237/Gemini_Generated_Image_sbvguqsbvguqsbvg_vjubkz.png", link:"https://tulocal.com/promo" },
];

const params = new URLSearchParams(window.location.search);

function makeItem(it) {

  const dynamicLink = params.get("link" + it.id) || it.link;

  return `
  <div style="background:#111;padding:10px;border-radius:10px">
    <img src="${it.src}" style="width:100%;border-radius:10px">
    <button onclick="navigator.clipboard.writeText('${dynamicLink}')" 
    style="margin-top:10px;width:100%;padding:10px;background:#ff2d78;color:white;border:none;border-radius:8px">
    COPIAR LINK
    </button>
  </div>
  `;
}

function render(){
  const g = document.getElementById("gImg");
  IMGS.forEach(i => {
    g.innerHTML += makeItem(i);
  });
}

render();

</script>

</body>
</html>
